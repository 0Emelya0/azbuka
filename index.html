<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Весёлая Азбука 3D - Учим буквы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            overflow: hidden;
            font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', cursive, sans-serif;
            background: #8ecae6;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 20;
        }
        .top-bar {
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
        }
        .controls-info, .hint {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            padding: 8px 18px;
            border-radius: 50px;
            color: #ffefb9;
            font-size: 0.9rem;
            font-weight: bold;
            pointer-events: auto;
            font-family: monospace;
        }
        .letter-panel {
            position: absolute;
            top: 80px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
        }
        .letter-card {
            background: rgba(255, 248, 225, 0.96);
            backdrop-filter: blur(16px);
            border-radius: 80px;
            display: inline-block;
            padding: 12px 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25), 0 0 0 5px #ffd966, 0 0 0 10px #f9b83a;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .letter-card:active { transform: scale(0.97); }
        .letter-card h1 {
            font-size: 3.8rem;
            margin: 0;
            color: #2e5c3e;
            text-shadow: 3px 3px 0 #ffd966;
            letter-spacing: 4px;
        }
        .letter-card p {
            font-size: 1.3rem;
            margin: 5px 0 0;
            color: #4a2e1e;
            font-weight: bold;
        }
        .nav-btn {
            position: absolute;
            bottom: 30px;
            background: #ffb347;
            border: none;
            border-radius: 60px;
            padding: 16px 32px;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0 #c45100;
            cursor: pointer;
            box-shadow: 0 8px 0 #c45100;
            transition: 0.05s linear;
            z-index: 30;
            font-family: inherit;
            pointer-events: auto;
            min-width: 130px;
        }
        .nav-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #c45100;
        }
        .next-btn { right: 20px; }
        .prev-btn { left: 20px; background: #66bb6a; text-shadow: 2px 2px 0 #2e7d32; box-shadow: 0 8px 0 #2e7d32; }
        .progress-container {
            position: absolute;
            bottom: 120px;
            left: 20px;
            right: 20px;
            height: 6px;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            overflow: hidden;
            z-index: 25;
            pointer-events: none;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd966, #ffb347);
            width: 0%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .sound-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border: none;
            border-radius: 50px;
            padding: 8px 20px;
            color: #ffd966;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 30;
            font-family: monospace;
            pointer-events: auto;
        }
        .sound-btn:active { transform: scale(0.95); }
        .emoji-card {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            background: rgba(255, 252, 235, 0.95);
            border-radius: 50px;
            width: 180px;
            height: 180px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 35px rgba(0,0,0,0.25), 0 0 0 5px #ffd966, 0 0 0 10px #ffb347;
            font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
        }
        @media (max-width: 700px) {
            .nav-btn { padding: 12px 24px; font-size: 1.4rem; min-width: 100px; bottom: 20px; }
            .letter-card h1 { font-size: 2.6rem; }
            .letter-card p { font-size: 1rem; }
            .letter-card { padding: 8px 20px; }
            .letter-panel { top: 60px; }
            .emoji-card { width: 130px; height: 130px; font-size: 80px; border-radius: 35px; }
            .controls-info, .hint { font-size: 0.7rem; padding: 6px 12px; }
            .progress-container { bottom: 100px; }
            .sound-btn { padding: 6px 14px; font-size: 0.8rem; top: 12px; right: 15px; }
        }
        @media (max-width: 480px) {
            .nav-btn { padding: 10px 18px; font-size: 1.2rem; min-width: 80px; }
            .letter-card h1 { font-size: 2rem; letter-spacing: 2px; }
            .letter-card p { font-size: 0.85rem; }
            .letter-card { padding: 6px 15px; }
            .letter-panel { top: 50px; }
            .emoji-card { width: 100px; height: 100px; font-size: 60px; border-radius: 25px; }
            .progress-container { bottom: 90px; }
        }
        @keyframes pulseAnim {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        .speaking { animation: pulseAnim 0.2s ease-in-out; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-overlay">
        <div class="top-bar">
            <div class="controls-info">🖱️👆 Вращай сцену</div>
            <div class="hint">🎵 Нажми на букву</div>
        </div>
        <div class="letter-panel">
            <div class="letter-card" id="letterCard">
                <h1 id="currentLetter">А</h1>
                <p id="letterWord">Арбуз 🍉</p>
            </div>
        </div>
        <div class="progress-container">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <button class="nav-btn prev-btn" id="prevBtn">◀ Назад</button>
        <button class="nav-btn next-btn" id="nextBtn">Вперёд ▶</button>
        <button class="sound-btn" id="soundBtn">🔊 Звук вкл</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ------------------- АЛФАВИТ -------------------
        const alphabet = [
            { letter: "А", word: "Арбуз", color: 0xe34234, emoji: "🍉" },
            { letter: "Б", word: "Барабан", color: 0x3a9b5e, emoji: "🥁" },
            { letter: "В", word: "Волк", color: 0x5d6d7e, emoji: "🐺" },
            { letter: "Г", word: "Гусь", color: 0xf4d03f, emoji: "🦢" },
            { letter: "Д", word: "Дом", color: 0xc44536, emoji: "🏠" },
            { letter: "Е", word: "Енот", color: 0x7f8c8d, emoji: "🦝" },
            { letter: "Ё", word: "Ёлка", color: 0x2e8b57, emoji: "🎄" },
            { letter: "Ж", word: "Жук", color: 0xf1c40f, emoji: "🐞" },
            { letter: "З", word: "Зебра", color: 0x34495e, emoji: "🦓" },
            { letter: "И", word: "Игрушка", color: 0xe67e22, emoji: "🧸" },
            { letter: "Й", word: "Йогурт", color: 0xf5b041, emoji: "🥛" },
            { letter: "К", word: "Кот", color: 0xf39c12, emoji: "🐱" },
            { letter: "Л", word: "Лиса", color: 0xe59866, emoji: "🦊" },
            { letter: "М", word: "Медведь", color: 0x8e44ad, emoji: "🐻" },
            { letter: "Н", word: "Носорог", color: 0x5d6d7e, emoji: "🦏" },
            { letter: "О", word: "Облако", color: 0xaed6f1, emoji: "☁️" },
            { letter: "П", word: "Петух", color: 0xe67e22, emoji: "🐓" },
            { letter: "Р", word: "Ромашка", color: 0xf8c471, emoji: "🌼" },
            { letter: "С", word: "Слон", color: 0x95a5a6, emoji: "🐘" },
            { letter: "Т", word: "Трактор", color: 0x27ae60, emoji: "🚜" },
            { letter: "У", word: "Утка", color: 0xf4d03f, emoji: "🦆" },
            { letter: "Ф", word: "Флаг", color: 0x3498db, emoji: "🏁" },
            { letter: "Х", word: "Хомяк", color: 0xe59866, emoji: "🐹" },
            { letter: "Ц", word: "Цыпленок", color: 0xf7dc6f, emoji: "🐥" },
            { letter: "Ч", word: "Чайник", color: 0x5dade2, emoji: "🫖" },
            { letter: "Ш", word: "Шарик", color: 0xb2babb, emoji: "🎈" },
            { letter: "Щ", word: "Щенок", color: 0xd35400, emoji: "🐕" },
            { letter: "Ъ", word: "Твёрдый знак", color: 0x7f8c8d, emoji: "🔷" },
            { letter: "Ы", word: "Сыр", color: 0xfad7a1, emoji: "🧀" },
            { letter: "Ь", word: "Мягкий знак", color: 0xbdc3c7, emoji: "🌸" },
            { letter: "Э", word: "Эму", color: 0xb9770e, emoji: "🐦" },
            { letter: "Ю", word: "Юла", color: 0xc0392b, emoji: "🪀" },
            { letter: "Я", word: "Яблоко", color: 0xe74c3c, emoji: "🍎" }
        ];

        let currentIndex = 0;
        const totalLetters = alphabet.length;

        // DOM элементы
        const letterHeader = document.getElementById('currentLetter');
        const wordParagraph = document.getElementById('letterWord');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const letterCard = document.getElementById('letterCard');
        const progressFill = document.getElementById('progressFill');
        const soundBtn = document.getElementById('soundBtn');
        const container = document.getElementById('canvas-container');

        // ------------------- ЗВУК С ГАРАНТИЕЙ РАБОТЫ НА ТЕЛЕФОНЕ -------------------
        let soundEnabled = true;
        let audioCtx = null;
        let speechUnlocked = false;

        // Функция принудительной разблокировки SpeechSynthesis (мобильные требуют)
        function unlockSpeech() {
            if (speechUnlocked) return;
            speechUnlocked = true;
            try {
                // Пустой запрос, чтобы активировать SpeechSynthesis
                const dummy = new SpeechSynthesisUtterance('');
                dummy.lang = 'ru-RU';
                window.speechSynthesis.speak(dummy);
                setTimeout(() => window.speechSynthesis.cancel(), 100);
            } catch(e) {}
        }

        function playBeep() {
            if (!soundEnabled) return;
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 880;
                gain.gain.value = 0.08;
                osc.type = 'sine';
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);
                osc.stop(audioCtx.currentTime + 0.2);
            } catch(e) {}
        }

        // Озвучивание вызывается синхронно, без setTimeout
        function speakLetterNow(letter) {
            if (!soundEnabled) return;
            unlockSpeech(); // гарантия активации SpeechSynthesis
            playBeep();
            try {
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel(); // отменяем предыдущее
                    const utterance = new SpeechSynthesisUtterance(letter);
                    utterance.lang = 'ru-RU';
                    utterance.rate = 0.75;
                    utterance.pitch = 1.4;
                    utterance.volume = 1;
                    window.speechSynthesis.speak(utterance);
                }
            } catch(e) { console.log("Ошибка озвучки", e); }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            soundBtn.textContent = soundEnabled ? '🔊 Звук вкл' : '🔇 Звук выкл';
            if (soundEnabled) {
                playBeep();
            } else {
                if (audioCtx) audioCtx.suspend();
                if (window.speechSynthesis) window.speechSynthesis.cancel();
            }
        }

        soundBtn.addEventListener('click', toggleSound);
        soundBtn.addEventListener('touchstart', (e) => { e.preventDefault(); toggleSound(); }, { passive: false });

        // Разблокировка по первому касанию
        function firstTouchUnlock() {
            unlockSpeech();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            document.removeEventListener('touchstart', firstTouchUnlock);
            document.removeEventListener('click', firstTouchUnlock);
        }
        document.addEventListener('touchstart', firstTouchUnlock);
        document.addEventListener('click', firstTouchUnlock);

        // ------------------- 3D СЦЕНА -------------------
        function init3D() {
            while (container.firstChild) container.removeChild(container.firstChild);

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x8ecae6);
            scene.fog = new THREE.FogExp2(0x8ecae6, 0.007);

            const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(4.5, 3.8, 6.5);
            camera.lookAt(0, 1.2, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            container.appendChild(labelRenderer.domElement);

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.06;
            controls.autoRotate = false;
            controls.enableZoom = true;
            controls.zoomSpeed = 0.8;
            controls.rotateSpeed = 1.0;
            controls.target.set(0, 1.2, 0);
            controls.touchRotate = true;
            controls.touchZoom = true;

            const ambient = new THREE.AmbientLight(0xffffff, 0.65);
            scene.add(ambient);
            const mainLight = new THREE.DirectionalLight(0xfff5d1, 1.3);
            mainLight.position.set(5, 8, 4);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 1024;
            mainLight.shadow.mapSize.height = 1024;
            scene.add(mainLight);
            const fillLight = new THREE.PointLight(0xffaa88, 0.5);
            fillLight.position.set(-2, 2.5, 4);
            scene.add(fillLight);
            const backLight = new THREE.PointLight(0x88aaff, 0.45);
            backLight.position.set(0, 2.5, -5);
            scene.add(backLight);

            const platformMat = new THREE.MeshStandardMaterial({ color: 0xffdd99, roughness: 0.35, metalness: 0.05, emissive: 0x442200, emissiveIntensity: 0.06 });
            const platform = new THREE.Mesh(new THREE.CylinderGeometry(3.4, 3.4, 0.18, 32), platformMat);
            platform.position.set(0, -0.68, 0);
            platform.receiveShadow = true;
            platform.castShadow = true;
            scene.add(platform);

            const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff6633, emissiveIntensity: 0.2 });
            const ring = new THREE.Mesh(new THREE.TorusGeometry(3.5, 0.1, 64, 200), ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = -0.62;
            scene.add(ring);

            const floatingSpheres = [];
            for (let i = 0; i < 18; i++) {
                const size = 0.1 + Math.random() * 0.12;
                const colors = [0xffaa88, 0xaaffcc, 0xffccaa, 0xffaacc, 0x88ddff];
                const sphereMat = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)], emissive: 0x442200, emissiveIntensity: 0.08 });
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(size, 10, 10), sphereMat);
                sphere.position.set((Math.random() - 0.5) * 8, Math.random() * 3 - 0.5, (Math.random() - 0.5) * 7);
                sphere.castShadow = false;
                sphere.receiveShadow = false;
                scene.add(sphere);
                floatingSpheres.push({ mesh: sphere, speed: 0.004 + Math.random() * 0.012, offsetY: sphere.position.y, range: 0.22, phase: Math.random() * Math.PI * 2 });
            }

            function createLetterCube(letter, colorHex) {
                const group = new THREE.Group();
                const boxMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.2, metalness: 0.05, emissive: 0x331100, emissiveIntensity: 0.08 });
                const cube = new THREE.Mesh(new THREE.BoxGeometry(1.15, 1.15, 1.15), boxMat);
                cube.castShadow = true;
                cube.receiveShadow = true;
                group.add(cube);
                
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#FFFEF8';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = `#${colorHex.toString(16).padStart(6, '0')}`;
                ctx.lineWidth = 22;
                ctx.strokeRect(28, 28, canvas.width - 56, canvas.height - 56);
                ctx.fillStyle = `#${colorHex.toString(16).padStart(6, '0')}`;
                ctx.font = `Bold ${canvas.width * 0.56}px "Comic Neue", "Comic Sans MS"`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(letter, canvas.width/2, canvas.height/2);
                for(let i=0;i<60;i++) {
                    ctx.fillStyle = `hsl(${Math.random() * 360}, 80%, 65%)`;
                    ctx.beginPath();
                    ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 5 + 2, 0, Math.PI*2);
                    ctx.fill();
                }
                const texture = new THREE.CanvasTexture(canvas);
                const faceMat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.15, metalness: 0.02 });
                const sticker = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.0, 0.07), faceMat);
                sticker.position.set(0, 0, 0.6);
                group.add(sticker);
                
                const edgeMatSmall = new THREE.MeshStandardMaterial({ color: 0xffeebb });
                for (let ix = -1; ix <= 1; ix+=2) {
                    for (let iz = -1; iz <= 1; iz+=2) {
                        const corner = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), edgeMatSmall);
                        corner.position.set(ix*0.58, iz*0.58, 0.59);
                        group.add(corner);
                    }
                }
                return group;
            }

            function createEmojiCard(emoji, colorHex) {
                const div = document.createElement('div');
                div.className = 'emoji-card';
                div.textContent = emoji;
                div.style.background = `rgba(${(colorHex >> 16 & 255)}, ${(colorHex >> 8 & 255)}, ${colorHex & 255}, 0.15)`;
                const css2d = new CSS2DObject(div);
                css2d.position.set(3.2, 0.0, 1.2);
                return css2d;
            }

            let currentCubeGroup = null;
            let currentEmojiObject = null;

            function updateProgress() {
                const percent = ((currentIndex + 1) / totalLetters) * 100;
                progressFill.style.width = `${percent}%`;
            }

            function switchToLetter(index) {
                const data = alphabet[index];
                letterHeader.textContent = data.letter;
                wordParagraph.innerHTML = `${data.word} ${data.emoji}`;
                updateProgress();
                
                if (currentCubeGroup) scene.remove(currentCubeGroup);
                if (currentEmojiObject) scene.remove(currentEmojiObject);
                
                currentCubeGroup = createLetterCube(data.letter, data.color);
                currentCubeGroup.position.set(0, 0.2, 0);
                scene.add(currentCubeGroup);
                
                currentEmojiObject = createEmojiCard(data.emoji, data.color);
                scene.add(currentEmojiObject);
                
                currentCubeGroup.scale.set(0.1, 0.1, 0.1);
                let startAnim = performance.now();
                function popAnim() {
                    const t = Math.min(1, (performance.now() - startAnim) / 350);
                    const ease = 1 - Math.pow(1-t, 3);
                    if (currentCubeGroup) currentCubeGroup.scale.setScalar(0.1 + ease * 0.9);
                    if (t < 1) requestAnimationFrame(popAnim);
                    else if(currentCubeGroup) currentCubeGroup.scale.set(1,1,1);
                }
                requestAnimationFrame(popAnim);
                
                if (currentEmojiObject && currentEmojiObject.element) {
                    currentEmojiObject.element.style.transform = 'scale(0)';
                    setTimeout(() => {
                        if (currentEmojiObject && currentEmojiObject.element) {
                            currentEmojiObject.element.style.transform = 'scale(1)';
                        }
                    }, 50);
                }
                // Озвучиваем новую букву без задержки (но небольшая задержка для анимации не влияет на разрешение)
                setTimeout(() => speakLetterNow(data.letter), 80);
            }

            function nextLetter() {
                currentIndex = (currentIndex + 1) % totalLetters;
                switchToLetter(currentIndex);
            }
            function prevLetter() {
                currentIndex = (currentIndex - 1 + totalLetters) % totalLetters;
                switchToLetter(currentIndex);
            }

            // Прямые обработчики
            nextBtn.onclick = () => nextLetter();
            nextBtn.ontouchstart = (e) => { e.preventDefault(); nextLetter(); };
            prevBtn.onclick = () => prevLetter();
            prevBtn.ontouchstart = (e) => { e.preventDefault(); prevLetter(); };
            
            const onCardClick = () => {
                speakLetterNow(alphabet[currentIndex].letter);
                letterCard.classList.add('speaking');
                setTimeout(() => letterCard.classList.remove('speaking'), 200);
            };
            letterCard.onclick = onCardClick;
            letterCard.ontouchstart = (e) => { e.preventDefault(); onCardClick(); };

            switchToLetter(0);

            let time = 0;
            function animate() {
                requestAnimationFrame(animate);
                time = performance.now() / 1000;
                ring.rotation.z += 0.008;
                floatingSpheres.forEach(ball => {
                    ball.mesh.position.y = ball.offsetY + Math.sin(time * ball.speed * 2 + ball.phase) * ball.range;
                    ball.mesh.rotation.x += 0.005;
                    ball.mesh.rotation.y += 0.008;
                });
                if (currentCubeGroup) {
                    currentCubeGroup.rotation.y = Math.sin(time * 1.2) * 0.08;
                    currentCubeGroup.position.y = 0.2 + Math.sin(time * 2.2) * 0.015;
                }
                if (currentEmojiObject) {
                    currentEmojiObject.position.y = 0.0 + Math.sin(time * 2.0) * 0.035;
                }
                controls.update();
                renderer.render(scene, camera);
                labelRenderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                const width = window.innerWidth;
                const height = window.innerHeight;
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
                renderer.setSize(width, height);
                labelRenderer.setSize(width, height);
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init3D);
        } else {
            init3D();
        }
    </script>
</body>
</html>
