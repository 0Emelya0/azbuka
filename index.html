<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Весёлая Азбука 3D - Учим буквы с мамой и папой</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', cursive, sans-serif;
            background-color: #1a2a32;
            touch-action: none;
        }

        /* Верхняя панель */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            z-index: 20;
            pointer-events: none;
        }

        .controls-info {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            color: #ffefb9;
            font-size: 0.8rem;
            font-weight: bold;
            font-family: monospace;
            pointer-events: auto;
        }

        .hint {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            color: #ffefb9;
            font-size: 0.75rem;
            pointer-events: auto;
            text-align: right;
        }

        /* Центральная панель с буквой */
        .ui-panel {
            position: absolute;
            bottom: 30%;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .letter-card {
            background: rgba(255, 248, 225, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 80px;
            display: inline-block;
            padding: 12px 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25), 0 0 0 5px #ffd966, 0 0 0 10px #f9b83a;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .letter-card:active {
            transform: scale(0.97);
        }

        .letter-card h1 {
            font-size: 4.5rem;
            margin: 0;
            color: #2e5c3e;
            text-shadow: 3px 3px 0 #ffd966;
            letter-spacing: 6px;
        }

        .letter-card p {
            font-size: 1.4rem;
            margin: 5px 0 0;
            color: #4a2e1e;
            font-weight: bold;
        }

        /* Кнопки навигации - крупные для мобильных */
        .nav-btn {
            position: absolute;
            bottom: 20px;
            background: #ffb347;
            border: none;
            border-radius: 60px;
            padding: 18px 32px;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0 #c45100;
            cursor: pointer;
            box-shadow: 0 8px 0 #c45100;
            transition: 0.05s linear;
            z-index: 20;
            font-family: inherit;
            pointer-events: auto;
            min-width: 120px;
            touch-action: manipulation;
        }

        .nav-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #c45100;
        }

        .next-btn { right: 16px; }
        .prev-btn { left: 16px; background: #66bb6a; text-shadow: 2px 2px 0 #2e7d32; box-shadow: 0 8px 0 #2e7d32; }

        /* Индикатор прогресса */
        .progress-bar {
            position: absolute;
            bottom: 120px;
            left: 20px;
            right: 20px;
            height: 6px;
            background: rgba(255,255,200,0.3);
            border-radius: 10px;
            overflow: hidden;
            z-index: 15;
            pointer-events: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd966, #ffb347);
            width: 0%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        /* Звуковая кнопка */
        .sound-toggle {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 50px;
            padding: 8px 20px;
            color: #ffd966;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 25;
            font-family: monospace;
            pointer-events: auto;
            touch-action: manipulation;
        }

        .sound-toggle:active {
            background: rgba(0,0,0,0.8);
        }

        /* Стиль для карточки с эмодзи в 3D */
        .emoji-card {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            background: rgba(255, 252, 235, 0.95);
            border-radius: 50px;
            width: 160px;
            height: 160px;
            backdrop-filter: blur(8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.25), 0 0 0 5px #ffd966, 0 0 0 10px #ffb347;
            transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
            font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
            font-weight: normal;
        }

        @media (max-width: 700px) {
            .nav-btn {
                padding: 12px 24px;
                font-size: 1.5rem;
                min-width: 90px;
            }
            .letter-card h1 { font-size: 2.8rem; }
            .letter-card p { font-size: 1rem; }
            .letter-card { padding: 8px 20px; }
            .emoji-card { width: 120px; height: 120px; font-size: 75px; }
            .controls-info { font-size: 0.65rem; padding: 5px 12px; }
            .hint { font-size: 0.6rem; padding: 5px 12px; }
            .progress-bar { bottom: 100px; }
            .sound-toggle { bottom: 15px; padding: 6px 16px; font-size: 0.9rem; }
        }

        @media (max-width: 480px) {
            .nav-btn { padding: 10px 18px; font-size: 1.2rem; min-width: 70px; }
            .letter-card h1 { font-size: 2.2rem; }
            .emoji-card { width: 95px; height: 95px; font-size: 60px; }
        }

        @keyframes gentlePulse {
            0% { transform: scale(1); text-shadow: 0 0 0 rgba(255,215,0,0); }
            100% { transform: scale(1.05); text-shadow: 0 0 12px rgba(255,215,0,0.9); }
        }
        
        .speaking {
            animation: gentlePulse 0.3s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="controls-info">
            🖱️👆 Вращай сцену пальцем!
        </div>
        <div class="hint">
            🎵 Нажми на букву — услышишь звук
        </div>
    </div>

    <div class="ui-panel">
        <div class="letter-card" id="letterCard">
            <h1 id="currentLetter">А</h1>
            <p id="letterWord">Арбуз 🍉</p>
        </div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <button class="nav-btn prev-btn" id="prevBtn">◀ Назад</button>
    <button class="nav-btn next-btn" id="nextBtn">Вперёд ▶</button>
    
    <button class="sound-toggle" id="soundToggleBtn">🔊 Звук вкл</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ========== АЛФАВИТ ==========
        const alphabet = [
            { letter: "А", word: "Арбуз", color: 0xe34234, emoji: "🍉" },
            { letter: "Б", word: "Барабан", color: 0x3a9b5e, emoji: "🥁" },
            { letter: "В", word: "Волк", color: 0x5d6d7e, emoji: "🐺" },
            { letter: "Г", word: "Гусь", color: 0xf4d03f, emoji: "🦢" },
            { letter: "Д", word: "Дом", color: 0xc44536, emoji: "🏠" },
            { letter: "Е", word: "Енот", color: 0x7f8c8d, emoji: "🦝" },
            { letter: "Ё", word: "Ёлка", color: 0x2e8b57, emoji: "🎄" },
            { letter: "Ж", word: "Жук", color: 0xf1c40f, emoji: "🐞" },
            { letter: "З", word: "Зебра", color: 0x34495e, emoji: "🦓" },
            { letter: "И", word: "Игрушка", color: 0xe67e22, emoji: "🧸" },
            { letter: "Й", word: "Йогурт", color: 0xf5b041, emoji: "🥛" },
            { letter: "К", word: "Кот", color: 0xf39c12, emoji: "🐱" },
            { letter: "Л", word: "Лиса", color: 0xe59866, emoji: "🦊" },
            { letter: "М", word: "Медведь", color: 0x8e44ad, emoji: "🐻" },
            { letter: "Н", word: "Носорог", color: 0x5d6d7e, emoji: "🦏" },
            { letter: "О", word: "Облако", color: 0xaed6f1, emoji: "☁️" },
            { letter: "П", word: "Петух", color: 0xe67e22, emoji: "🐓" },
            { letter: "Р", word: "Ромашка", color: 0xf8c471, emoji: "🌼" },
            { letter: "С", word: "Слон", color: 0x95a5a6, emoji: "🐘" },
            { letter: "Т", word: "Трактор", color: 0x27ae60, emoji: "🚜" },
            { letter: "У", word: "Утка", color: 0xf4d03f, emoji: "🦆" },
            { letter: "Ф", word: "Флаг", color: 0x3498db, emoji: "🏁" },
            { letter: "Х", word: "Хомяк", color: 0xe59866, emoji: "🐹" },
            { letter: "Ц", word: "Цыпленок", color: 0xf7dc6f, emoji: "🐥" },
            { letter: "Ч", word: "Чайник", color: 0x5dade2, emoji: "🫖" },
            { letter: "Ш", word: "Шарик", color: 0xb2babb, emoji: "🎈" },
            { letter: "Щ", word: "Щенок", color: 0xd35400, emoji: "🐕" },
            { letter: "Ъ", word: "Твёрдый знак", color: 0x7f8c8d, emoji: "🔷" },
            { letter: "Ы", word: "Сыр", color: 0xfad7a1, emoji: "🧀" },
            { letter: "Ь", word: "Мягкий знак", color: 0xbdc3c7, emoji: "🌸" },
            { letter: "Э", word: "Эму", color: 0xb9770e, emoji: "🐦" },
            { letter: "Ю", word: "Юла", color: 0xc0392b, emoji: "🪀" },
            { letter: "Я", word: "Яблоко", color: 0xe74c3c, emoji: "🍎" }
        ];

        let currentIndex = 0;
        const totalLetters = alphabet.length;

        // UI элементы
        const letterHeader = document.getElementById('currentLetter');
        const wordParagraph = document.getElementById('letterWord');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const letterCard = document.getElementById('letterCard');
        const progressFill = document.getElementById('progressFill');

        // === ЗВУКОВАЯ СИСТЕМА ===
        let audioCtx = null;
        let soundEnabled = true;
        let soundInitialized = false;
        const soundToggleBtn = document.getElementById('soundToggleBtn');

        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {
                console.log("Web Audio API не поддерживается");
                soundEnabled = false;
                soundToggleBtn.textContent = "🔇 Звук недоступен";
            }
        }

        function playPopSound() {
            if (!soundEnabled || !audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 880;
                gain.gain.value = 0.08;
                osc.type = 'sine';
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.25);
                osc.stop(audioCtx.currentTime + 0.25);
            } catch(e) { console.log("Звук не воспроизведён"); }
        }

        function playClickSound() {
            if (!soundEnabled || !audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 660;
                gain.gain.value = 0.06;
                osc.type = 'sine';
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.15);
                osc.stop(audioCtx.currentTime + 0.15);
            } catch(e) {}
        }

        function playLetterSound(letter) {
            if (!soundEnabled) return;
            playPopSound();
            try {
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(letter);
                    utterance.lang = 'ru-RU';
                    utterance.rate = 0.7;
                    utterance.pitch = 1.45;
                    utterance.volume = 0.95;
                    setTimeout(() => window.speechSynthesis.speak(utterance), 30);
                }
            } catch(e) { console.log("Озвучка не поддерживается"); }
        }

        soundToggleBtn.addEventListener('click', () => {
            if (!audioCtx && !soundInitialized) {
                initAudio();
                soundInitialized = true;
            }
            soundEnabled = !soundEnabled;
            if (soundEnabled) {
                soundToggleBtn.textContent = "🔊 Звук вкл";
                playClickSound();
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            } else {
                soundToggleBtn.textContent = "🔇 Звук выкл";
                if (audioCtx) audioCtx.suspend();
            }
        });

        // Инициализация звука при первом касании
        function initAudioOnFirstTouch() {
            if (!soundInitialized) {
                initAudio();
                soundInitialized = true;
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            }
            document.removeEventListener('touchstart', initAudioOnFirstTouch);
            document.removeEventListener('click', initAudioOnFirstTouch);
        }
        document.addEventListener('touchstart', initAudioOnFirstTouch);
        document.addEventListener('click', initAudioOnFirstTouch);

        // === 3D СЦЕНА ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x9ad0f5);
        scene.fog = new THREE.FogExp2(0x9ad0f5, 0.007);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4.8, 4.0, 7.0);
        camera.lookAt(0, 1.2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // Орбит контрол с оптимизацией для тач
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.07;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 0.8;
        controls.rotateSpeed = 1.0;
        controls.target.set(0, 1.2, 0);
        controls.touchRotate = true;
        controls.touchZoom = true;

        // === ОСВЕЩЕНИЕ ===
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xfff5d1, 1.3);
        mainLight.position.set(5, 8, 4);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0xffaa88, 0.5);
        fillLight.position.set(-2, 2, 4);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0x88aaff, 0.45);
        backLight.position.set(0, 2, -5);
        scene.add(backLight);
        
        // === ПЛАТФОРМА ===
        const platformMat = new THREE.MeshStandardMaterial({ color: 0xffdd99, roughness: 0.35, metalness: 0.05, emissive: 0x442200, emissiveIntensity: 0.08 });
        const platform = new THREE.Mesh(new THREE.CylinderGeometry(3.5, 3.5, 0.18, 32), platformMat);
        platform.position.set(0, -0.68, 0);
        platform.receiveShadow = true;
        platform.castShadow = true;
        scene.add(platform);
        
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff6633, emissiveIntensity: 0.2 });
        const ring = new THREE.Mesh(new THREE.TorusGeometry(3.6, 0.1, 64, 200), ringMat);
        ring.rotation.x = Math.PI / 2;
        ring.position.y = -0.62;
        scene.add(ring);
        
        // Парящие шарики (уменьшено для мобильных)
        const floatingSpheres = [];
        const sphereColors = [0xffaa88, 0xaaffcc, 0xffccaa, 0xffaacc, 0x88ddff];
        for (let i = 0; i < 20; i++) {
            const size = 0.1 + Math.random() * 0.12;
            const sphereMat = new THREE.MeshStandardMaterial({ color: sphereColors[Math.floor(Math.random() * sphereColors.length)], emissive: 0x442200, emissiveIntensity: 0.08 });
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(size, 12, 12), sphereMat);
            sphere.position.set((Math.random() - 0.5) * 8, Math.random() * 3 - 0.5, (Math.random() - 0.5) * 7);
            sphere.castShadow = false;
            sphere.receiveShadow = false;
            scene.add(sphere);
            floatingSpheres.push({ mesh: sphere, speed: 0.005 + Math.random() * 0.012, offsetY: sphere.position.y, range: 0.22, phase: Math.random() * Math.PI * 2 });
        }

        // === КУБИК ===
        let currentCubeGroup = null;
        let currentEmojiObject = null;

        function createLetterCube(letter, colorHex) {
            const group = new THREE.Group();
            const boxMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.2, metalness: 0.05, emissive: 0x331100, emissiveIntensity: 0.08 });
            const cube = new THREE.Mesh(new THREE.BoxGeometry(1.15, 1.15, 1.15), boxMat);
            cube.castShadow = true;
            cube.receiveShadow = true;
            group.add(cube);
            
            // Текстура с буквой
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#FFFEF8';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = `#${colorHex.toString(16).padStart(6, '0')}`;
            ctx.lineWidth = 20;
            ctx.strokeRect(28, 28, canvas.width - 56, canvas.height - 56);
            ctx.fillStyle = `#${colorHex.toString(16).padStart(6, '0')}`;
            ctx.font = `Bold ${canvas.width * 0.56}px "Comic Neue", "Comic Sans MS"`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(letter, canvas.width/2, canvas.height/2);
            for(let i=0;i<60;i++) {
                ctx.fillStyle = `hsl(${Math.random() * 360}, 80%, 65%)`;
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 5 + 2, 0, Math.PI*2);
                ctx.fill();
            }
            const texture = new THREE.CanvasTexture(canvas);
            const faceMat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.15, metalness: 0.02 });
            const sticker = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.0, 0.07), faceMat);
            sticker.position.set(0, 0, 0.6);
            group.add(sticker);
            
            // Уголки
            const edgeMatSmall = new THREE.MeshStandardMaterial({ color: 0xffeebb });
            for (let ix = -1; ix <= 1; ix+=2) {
                for (let iz = -1; iz <= 1; iz+=2) {
                    const corner = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), edgeMatSmall);
                    corner.position.set(ix*0.58, iz*0.58, 0.59);
                    group.add(corner);
                }
            }
            return group;
        }

        function createEmojiCard(emoji, colorHex) {
            const div = document.createElement('div');
            div.className = 'emoji-card';
            div.textContent = emoji;
            div.style.background = `rgba(${(colorHex >> 16 & 255)}, ${(colorHex >> 8 & 255)}, ${colorHex & 255}, 0.12)`;
            const css2d = new CSS2DObject(div);
            css2d.position.set(1.7, 0.0, 0.9);
            return css2d;
        }

        function updateProgress() {
            const percent = ((currentIndex + 1) / totalLetters) * 100;
            progressFill.style.width = `${percent}%`;
        }

        function switchToLetter(index) {
            const data = alphabet[index];
            letterHeader.textContent = data.letter;
            wordParagraph.innerHTML = `${data.word} ${data.emoji}`;
            updateProgress();
            
            if (currentCubeGroup) scene.remove(currentCubeGroup);
            if (currentEmojiObject) scene.remove(currentEmojiObject);
            
            currentCubeGroup = createLetterCube(data.letter, data.color);
            currentCubeGroup.position.set(0, 0.2, 0);
            scene.add(currentCubeGroup);
            
            currentEmojiObject = createEmojiCard(data.emoji, data.color);
            scene.add(currentEmojiObject);
            
            // Анимация появления
            currentCubeGroup.scale.set(0.1, 0.1, 0.1);
            let startAnim = performance.now();
            function popAnim() {
                const t = Math.min(1, (performance.now() - startAnim) / 350);
                const ease = 1 - Math.pow(1-t, 3);
                if (currentCubeGroup) currentCubeGroup.scale.setScalar(0.1 + ease * 0.9);
                if (t < 1) requestAnimationFrame(popAnim);
                else if(currentCubeGroup) currentCubeGroup.scale.set(1,1,1);
            }
            requestAnimationFrame(popAnim);
            
            if (currentEmojiObject && currentEmojiObject.element) {
                currentEmojiObject.element.style.transform = 'scale(0)';
                setTimeout(() => {
                    if (currentEmojiObject && currentEmojiObject.element) {
                        currentEmojiObject.element.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1)';
                        currentEmojiObject.element.style.transform = 'scale(1)';
                    }
                }, 50);
            }
            
            // Звук при смене буквы
            playClickSound();
            setTimeout(() => playLetterSound(data.letter), 120);
        }

        function nextLetter() { 
            currentIndex = (currentIndex + 1) % totalLetters; 
            switchToLetter(currentIndex); 
        }
        
        function prevLetter() { 
            currentIndex = (currentIndex - 1 + totalLetters) % totalLetters; 
            switchToLetter(currentIndex); 
        }
        
        nextBtn.addEventListener('click', nextLetter);
        prevBtn.addEventListener('click', prevLetter);
        letterCard.addEventListener('click', () => {
            playLetterSound(alphabet[currentIndex].letter);
            letterCard.classList.add('speaking');
            setTimeout(() => letterCard.classList.remove('speaking'), 300);
        });
        
        // Адаптация под мобильные: убираем задержку при касании
        nextBtn.addEventListener('touchstart', (e) => { e.preventDefault(); nextLetter(); }, { passive: false });
        prevBtn.addEventListener('touchstart', (e) => { e.preventDefault(); prevLetter(); }, { passive: false });
        letterCard.addEventListener('touchstart', (e) => { e.preventDefault(); playLetterSound(alphabet[currentIndex].letter); letterCard.classList.add('speaking'); setTimeout(() => letterCard.classList.remove('speaking'), 300); }, { passive: false });
        
        switchToLetter(0);
        
        // === АНИМАЦИЯ ===
        let timeAnim = 0;
        
        function animate() {
            timeAnim = performance.now() / 1000;
            ring.rotation.z += 0.008;
            
            floatingSpheres.forEach(ball => {
                ball.mesh.position.y = ball.offsetY + Math.sin(timeAnim * ball.speed * 2 + ball.phase) * ball.range;
                ball.mesh.rotation.x += 0.005;
                ball.mesh.rotation.y += 0.008;
            });
            
            if (currentCubeGroup) {
                currentCubeGroup.rotation.y = Math.sin(timeAnim * 1.2) * 0.08;
                currentCubeGroup.position.y = 0.2 + Math.sin(timeAnim * 2.2) * 0.015;
            }
            
            if (currentEmojiObject) {
                currentEmojiObject.position.y = 0.0 + Math.sin(timeAnim * 2.0) * 0.035;
            }
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Предзагрузка голосов
        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
        }
        
        console.log("Весёлая Азбука 3D запущена! Мобильная версия оптимизирована, звуки работают!");
    </script>
</body>
</html>
